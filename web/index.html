    <script type="importmap">
    { "imports": {
        "lit": "https://esm.sh/lit@3.2.0",
        "lit/decorators.js": "https://esm.sh/lit@3.2.0/decorators.js",
        "js-yaml": "https://esm.sh/js-yaml@4.1.0"
    } }

    <script type="module">
      import { LitElement, css, html, nothing } from 'lit';
      import yaml from 'js-yaml';

      // ======================================================================
      // Configuration — edit this for your own deploy.
      //
      // Resolution order for the LLM endpoint:
      //   1. window.A2UI_PROXY_URL set explicitly (via inline <script>)
      //   2. ?proxy= query-string override
      //   3. Localhost default — if served from 127.0.0.1 / localhost, try the
      //      local-proxy.py at :8787 (zero-setup demo path).
      //   4. Empty — fall back to direct Anthropic with a prompted API key
      //      stored in localStorage.
      const urlOverride = new URLSearchParams(location.search).get('proxy');
      const isLocal = ['localhost', '127.0.0.1'].includes(location.hostname);
      const PROXY_URL = window.A2UI_PROXY_URL || urlOverride || (isLocal ? 'http://localhost:8787' : '');
      const MODEL = 'claude-sonnet-4-5';

      // Client-side typewriter smoothing. Anthropic SSE delivers text in
      // big chunks (30–150 chars each). That's technically streaming but
      // visually lands as "pops". When > 0, we split each chunk into
      // single-char appends paced at this rate, which feels like typing.
      // Set to 0 to disable and pass chunks through unchanged.
      // Override via ?smooth=N in URL.
      const SMOOTH_CPS = Number(new URLSearchParams(location.search).get('smooth') ?? '220');
      // ======================================================================

      // ======================================================================
      // SECTION 1 — JSON Pointer + path binding resolution
      // (mirrors a2ui-swiftui's Core/Bindings.swift)
      // ======================================================================
      function resolvePointer(root, pointer) {
        if (!pointer || pointer === '/' || pointer === '') return root;
        const parts = pointer.startsWith('/') ? pointer.slice(1).split('/') : pointer.split('/');
        let c = root;
        for (const k of parts) {
          if (c == null || typeof c !== 'object') return undefined;
          c = c[k];
        }
        return c;
      }
      function setPointer(root, pointer, value) {
        const parts = pointer.startsWith('/') ? pointer.slice(1).split('/') : pointer.split('/');
        let c = root;
        for (let i = 0; i < parts.length - 1; i++) {
          const k = parts[i];
          if (typeof c[k] !== 'object' || c[k] === null) c[k] = {};
          c = c[k];
        }
        c[parts[parts.length - 1]] = value;
      }
      function resolveBindings(v, dm) {
        if (v == null || typeof v !== 'object') return v;
        if (Array.isArray(v)) return v.map(x => resolveBindings(x, dm));
        if (typeof v.path === 'string' && Object.keys(v).length === 1) return resolvePointer(dm, v.path);
        const out = {};
        for (const [k, val] of Object.entries(v)) out[k] = resolveBindings(val, dm);
        return out;
      }

      // ======================================================================
      // SECTION 2 — SurfaceState (components + data model + streaming path)
      // Implements RFC Proposals 2 (streaming flag) and 3 (append patch op)
      // ======================================================================
      class SurfaceState {
        constructor(id) {
          this.id = id;
          this.components = new Map();
          this.dataModel = {};
          this.activeStreamingPath = null;
        }
        applyComponents(components) {
          for (const c of components) {
            if (c && typeof c === 'object' && c.id) this.components.set(c.id, c);
          }
        }
        applyDataModel({ path, op = 'set', value = null, streaming = false }) {
          const isRoot = !path || path === '/' || path === '';
          switch (op) {
            case 'set':
              if (isRoot) this.dataModel = value ?? {};
              else setPointer(this.dataModel, path, value);
              break;
            case 'append': {
              const existing = isRoot ? this.dataModel : resolvePointer(this.dataModel, path);
              const merged = this._append(existing, value);
              if (isRoot) this.dataModel = merged;
              else setPointer(this.dataModel, path, merged);
              break;
            }
            case 'remove':
              if (!isRoot) setPointer(this.dataModel, path, null);
              break;
          }
          if (streaming) this.activeStreamingPath = path ?? null;
          else if (this.activeStreamingPath === path) this.activeStreamingPath = null;
        }
        isStreaming(path) { return this.activeStreamingPath === path; }
        _append(existing, incoming) {
          if (typeof existing === 'string' && typeof incoming === 'string') return existing + incoming;
          if (Array.isArray(existing)) return [...existing, incoming];
          if (existing == null) return incoming;
          return incoming;
        }
      }

      // ======================================================================
      // SECTION 3 — FieldParser
      // Port of Swift FieldParser — incrementally parses <field>text</field>
      // ======================================================================
      class FieldParser {
        constructor(fieldNames) {
          this.fieldNames = new Set(fieldNames);
          this.buffer = '';
          this.currentField = null;
          this.currentValue = '';
          this.lastEmitted = '';
        }
        feed(delta) {
          this.buffer += delta;
          const out = [];
          while (true) {
            if (this.currentField == null) {
              const lt = this.buffer.indexOf('<');
              if (lt === -1) { this.buffer = ''; return out; }
              const gt = this.buffer.indexOf('>', lt);
              if (gt === -1) { this.buffer = this.buffer.slice(lt); return out; }
              const tag = this.buffer.slice(lt + 1, gt);
              if (this.fieldNames.has(tag)) {
                this.currentField = tag;
                this.currentValue = '';
                this.lastEmitted = '';
                this.buffer = this.buffer.slice(gt + 1);
              } else {
                this.buffer = this.buffer.slice(gt + 1);
              }
            } else {
              const closing = `</${this.currentField}>`;
              const closeIdx = this.buffer.indexOf(closing);
              if (closeIdx !== -1) {
                this.currentValue += this.buffer.slice(0, closeIdx);
                const chunk = this.currentValue.slice(this.lastEmitted.length);
                out.push({ fieldName: this.currentField, accumulatedValue: this.currentValue, chunkValue: chunk, isFinal: true });
                this.buffer = this.buffer.slice(closeIdx + closing.length);
                this.currentField = null;
                this.currentValue = '';
                this.lastEmitted = '';
                continue;
              }
              // Minimal hold-back: only reserve trailing chars that could
              // be the *start* of the closing tag. Holding back closing.length-1
              // unconditionally swallows real content when the tail isn't tag-like.
              const maxHold = Math.min(closing.length - 1, this.buffer.length);
              let hold = 0;
              for (let h = maxHold; h >= 1; h--) {
                if (closing.startsWith(this.buffer.slice(-h))) { hold = h; break; }
              }
              if (this.buffer.length > hold) {
                const commit = this.buffer.slice(0, this.buffer.length - hold);
                this.currentValue += commit;
                this.buffer = this.buffer.slice(this.buffer.length - hold);
                if (this.currentValue !== this.lastEmitted) {
                  const chunk = this.currentValue.slice(this.lastEmitted.length);
                  out.push({ fieldName: this.currentField, accumulatedValue: this.currentValue, chunkValue: chunk, isFinal: false });
                  this.lastEmitted = this.currentValue;
                }
              }
              return out;
            }
          }
        }
        finish() {
          const out = [];
          if (this.currentField != null) {
            this.currentValue += this.buffer;
            if (this.currentValue !== this.lastEmitted) {
              const chunk = this.currentValue.slice(this.lastEmitted.length);
              out.push({ fieldName: this.currentField, accumulatedValue: this.currentValue, chunkValue: chunk, isFinal: true });
            }
            this.currentField = null;
            this.buffer = '';
          }
          return out;
        }
      }

      // ======================================================================
      // SECTION 4 — LLM providers
      // ======================================================================
      async function* streamAnthropicViaProxy({ systemPrompt, userMessage, history, fields, proxyUrl, apiKey }) {
        const tagTemplate = fields
          .map(f => `<${f.name}>${f.description.trim()}</${f.name}>`)
          .join('\n');
        const fullSystem = systemPrompt + `

## RESPONSE FORMAT

Output ONLY the XML-tagged response below, filled in. No preamble, no
commentary, no markdown code fences. Tags in the exact order shown.

${tagTemplate}

The descriptions above are INSTRUCTIONS for what to write inside each tag —
replace them with your actual content.`;

        const headers = { 'Content-Type': 'application/json' };
        if (apiKey) { headers['x-api-key'] = apiKey; headers['anthropic-version'] = '2023-06-01'; }

        const body = JSON.stringify({
          model: MODEL,
          max_tokens: 1024,
          system: fullSystem,
          messages: [
            ...history.map(h => ({ role: h.role, content: h.text })),
            { role: 'user', content: userMessage },
          ],
          stream: true,
        });

        const url = proxyUrl ? `${proxyUrl.replace(/\/$/, '')}/v1/messages` : 'https://api.anthropic.com/v1/messages';
        const resp = await fetch(url, { method: 'POST', headers, body });
        if (!resp.ok) {
          const err = await resp.text();
          throw new Error(`LLM endpoint error ${resp.status}: ${err.slice(0, 200)}`);
        }

        const parser = new FieldParser(fields.map(f => f.name));
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          let nl;
          while ((nl = buf.indexOf('\n')) !== -1) {
            const line = buf.slice(0, nl); buf = buf.slice(nl + 1);
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6).trim();
            if (payload === '[DONE]') continue;
            try {
              const ev = JSON.parse(payload);
              if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta' && ev.delta.text) {
                for (const d of parser.feed(ev.delta.text)) yield d;
              }
            } catch {/* ignore partial SSE lines */}
          }
        }
        for (const d of parser.finish()) yield d;
      }

      // ======================================================================
      // SECTION 5 — SKILL.md + catalog loaders
      //
      // Skills are real .md files with YAML frontmatter (matches Anthropic's
      // SKILL.md open standard). Catalog is JSON Schema at /catalog/catalog.json
      // (matches Google's A2UI basic_catalog.json shape).
      //
      // Both loaded at app init via fetch(). The SkillRuntime is hydrated once
      // the promises resolve.
      // ======================================================================
      function parseSkillMarkdown(md) {
        const m = /^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/.exec(md);
        if (!m) throw new Error('SKILL.md missing frontmatter fence');
        const frontmatter = yaml.load(m[1]) || {};
        const body = m[2] || '';
        // Normalize: skeleton components and fill_fields are what the runtime reads.
        const skill = {
          name: frontmatter.name,
          description: frontmatter.description || '',
          triggers: frontmatter.triggers || [],
          body,
          skeleton: frontmatter.first_turn_skeleton?.components || null,
          fillFields: frontmatter.first_turn_fill_fields
            ? Object.entries(frontmatter.first_turn_fill_fields).map(
                ([name, spec]) => ({ name, description: (spec?.description ?? spec ?? '').trim() })
              )
            : null,
        };
        if (!skill.name) throw new Error('SKILL.md missing `name` in frontmatter');
        return skill;
      }

      async function loadSkillBundles(ids) {
        const results = await Promise.all(ids.map(async id => {
          const resp = await fetch(`./skills/${id}.md`);
          if (!resp.ok) throw new Error(`Failed to load skills/${id}.md: HTTP ${resp.status}`);
          return parseSkillMarkdown(await resp.text());
        }));
        const map = new Map();
        for (const s of results) map.set(s.name, s);
        return map;
      }

      async function loadCatalog() {
        const resp = await fetch('../catalog/catalog.json');
        if (!resp.ok) return null;
        return await resp.json();
      }

      // ======================================================================
      // SECTION 6 — (Removed) Inline skills

                { id: 'feedback', label: 'Get honest feedback',            rationale: 'Draft, idea, or situation you want someone to cut through.',         emoji: '🎯',

            },
            { id: 'root', component: 'Column', children: ['hdr', 'sub', 'choice'], gap: 16 },
          ],
          fillFields: null,
        },

        planner: {

          triggers: ['want_plan'],
          body: `# Planner skill

                { id: 's3', label: { path: '/reply/step3_label' }, rationale: { path: '/reply/step3_rationale' }, emoji: '3️⃣', action: { event: { name: 'step_3_detail', context: {} } } },

      // ======================================================================
      // SECTION 7 — SkillRuntime (orchestrator)
      // ======================================================================
      class SkillRuntime {
        constructor({ skills, defaultSkillId, proxyUrl, apiKey = '' }) {
          this.skills = skills;
          this.defaultSkillId = defaultSkillId;
          this.activeSkillId = defaultSkillId;
          this.proxyUrl = proxyUrl;
          this.apiKey = apiKey;
          this.surfaces = new Map();
          this.turns = [];
          this.history = [];
          this.counter = 0;
          this.listeners = new Set();
          this.lastError = null;
          // Wire log: records every A2UI message the runtime produces.
          // Proves we're really speaking A2UI — the devtools panel surfaces this.
          this.wireLog = [];
        }

        _log(kind, payload) {
          this.wireLog.push({ ts: Date.now(), msg: { version: 'v0.9', [kind]: payload } });
          if (this.wireLog.length > 400) this.wireLog.splice(0, this.wireLog.length - 400);
        }
        subscribe(fn) { this.listeners.add(fn); return () => this.listeners.delete(fn); }
        emit() { for (const l of this.listeners) l(); }

        primeGreeting() {
          const greet = this.skills.get(this.defaultSkillId);
          if (!greet?.skeleton) return;
          const s = new SurfaceState('greeting');
          this._log('createSurface', { surfaceId: 'greeting', catalogId: 'a2ui/core@0.1' });
          this._log('updateComponents', { surfaceId: 'greeting', components: greet.skeleton });
          s.applyComponents(greet.skeleton);
          this.surfaces.set('greeting', s);
          this.turns.push({ kind: 'agent', surfaceId: 'greeting' });
          this.emit();
        }

        handleUserEvent(name, context = {}, echoLabel = null) {
          if (echoLabel) this.turns.push({ kind: 'userPill', label: echoLabel });
          this.turns.push({ kind: 'thinking', id: `t_${Date.now()}` });
          this.emit();
          this._processTurn({ userMessage: this._describeTap(name, context), eventName: name });
        }
        handleUserText(text) {
          this.turns.push({ kind: 'user', text });
          this.turns.push({ kind: 'thinking', id: `t_${Date.now()}` });
          this.emit();
          this._processTurn({ userMessage: text, eventName: null });
        }

        _describeTap(name, ctx) {
          const c = Object.keys(ctx).length ? ` with context ${JSON.stringify(ctx)}` : '';
          return `User tapped option: ${name}${c}.`;
        }

        async _processTurn({ userMessage, eventName }) {
          // Route
          if (eventName === 'restart') {
            this.activeSkillId = this.defaultSkillId;
          } else if (eventName) {
            for (const s of this.skills.values()) {
              if (s.triggers?.includes(eventName)) { this.activeSkillId = s.name; break; }
            }
          }
          const skill = this.skills.get(this.activeSkillId);
          if (!skill) return;

          this.counter++;
          const sid = `msg_${this.counter}`;
          const surface = new SurfaceState(sid);

          if (skill.skeleton && skill.fillFields && skill.triggers.includes(eventName)) {
            this._log('createSurface', { surfaceId: sid, catalogId: 'a2ui/core@0.1' });
            this._log('updateComponents', { surfaceId: sid, components: skill.skeleton });
            surface.applyComponents(skill.skeleton);
            this.surfaces.set(sid, surface);
            this._replaceThinking(sid);
            this.emit();
            await this._streamFill(skill, surface, userMessage, null, sid);
          } else {
            const fallback = [
              { id: 'hdr', component: 'Text', variant: 'body', text: { path: '/reply/body' } },
              { id: 'root', component: 'Column', children: ['hdr'] },
            ];
            this._log('createSurface', { surfaceId: sid, catalogId: 'a2ui/core@0.1' });
            this._log('updateComponents', { surfaceId: sid, components: fallback });
            surface.applyComponents(fallback);
            this.surfaces.set(sid, surface);
            this._replaceThinking(sid);
            this.emit();
            await this._streamFill(skill, surface, userMessage, [
              { name: 'body', description: 'A direct, helpful reply. Plain prose, no markdown.' }
            ], sid);
          }
          this.history.push({ role: 'user', text: userMessage });
        }

        _replaceThinking(surfaceId) {
          for (let i = this.turns.length - 1; i >= 0; i--) {
            if (this.turns[i].kind === 'thinking') {
              this.turns[i] = { kind: 'agent', surfaceId };
              return;
            }
          }
          this.turns.push({ kind: 'agent', surfaceId });
        }

        async _streamFill(skill, surface, userMessage, fieldsOverride = null, surfaceId = null) {
          const fields = fieldsOverride || skill.fillFields;
          const systemPrompt = skill.body;
          const finalVals = {};
          const sid = surfaceId ?? surface.id;
          try {
            for await (const delta of streamAnthropicViaProxy({
              systemPrompt, userMessage, history: this.history, fields,
              proxyUrl: this.proxyUrl, apiKey: this.apiKey,
            })) {
              const path = `/reply/${delta.fieldName}`;
              const isStreaming = !delta.isFinal;
              await this._applyChunkSmoothly({
                surfaceId: sid, path, chunk: delta.chunkValue, streaming: isStreaming,
              });
              finalVals[delta.fieldName] = delta.accumulatedValue;
            }
          } catch (e) {
            this.lastError = String(e.message || e);
            this.emit();
          }
          const historyText = Object.entries(finalVals).map(([k, v]) => `${k}: ${v}`).join('\n');
          if (historyText) this.history.push({ role: 'assistant', text: historyText });
        }

        // Apply a server chunk as N single-char appends paced by SMOOTH_CPS.
        // Each sub-append uses RFC Proposal 3's append op + Proposal 2's
        // streaming flag. Logs once per *server* chunk (not per char) to keep
        // the wire log readable.
        async _applyChunkSmoothly({ surfaceId, path, chunk, streaming }) {
          if (!chunk) return;
          const surface = this.surfaces.get(surfaceId);
          if (!surface) return;
          // Log the aggregate chunk as a single wire entry (what the server
          // actually sent over SSE). The per-char splits are client-side
          // smoothing, not wire events.
          this._log('updateDataModel', {
            surfaceId, path, patch: 'append', value: chunk, streaming,
          });
          if (SMOOTH_CPS <= 0) {
            surface.applyDataModel({ path, op: 'append', value: chunk, streaming });
            this.emit();
            return;
          }
          const delayMs = Math.max(1, Math.floor(1000 / SMOOTH_CPS));
          for (let i = 0; i < chunk.length; i++) {
            const isLastChar = i === chunk.length - 1;
            surface.applyDataModel({
              path, op: 'append', value: chunk[i],
              streaming: streaming || !isLastChar,
            });
            this.emit();
            if (!isLastChar) await new Promise(r => setTimeout(r, delayMs));
          }
        }
      }

      // ======================================================================
      // SECTION 8 — A2UI renderer (component dispatch + SwiftUI-parity shapes)
      // ======================================================================
      function renderComponent(id, surface, emit) {
        const raw = surface.components.get(id);
        if (!raw) return html`<span class="pending-child"></span>`;
        const resolved = resolveBindings(raw, surface.dataModel);
        const textStreaming     = isStreamingBinding(raw.text, surface);
        const headlineStreaming = isStreamingBinding(raw.headline, surface);
        const rationaleStreaming = isStreamingBinding(raw.rationale, surface);
        switch (resolved.component) {
          case 'Column': {
            const children = resolved.children ?? [];
            const gap = resolved.gap ?? 12;
            return html`<div style="display:flex;flex-direction:column;gap:${gap}px">
              ${children.map(cid => renderComponent(cid, surface, emit))}
            </div>`;
          }
          case 'Row': {
            const children = resolved.children ?? [];
            const gap = resolved.gap ?? 12;
            const align = resolved.align ?? 'center';
            return html`<div style="display:flex;flex-direction:row;align-items:${align};gap:${gap}px;flex-wrap:wrap">
              ${children.map(cid => renderComponent(cid, surface, emit))}
            </div>`;
          }
          case 'Text': return renderText(resolved, textStreaming);
          case 'Button': return renderButton(resolved, emit);
          case 'Link': return renderLink(resolved, emit);
          case 'Card':
            return html`<div class="card">
              ${resolved.title ? html`<h3 class="card-title">${resolved.title}</h3>` : nothing}
              ${renderComponent(resolved.child, surface, emit)}
            </div>`;
          case 'Divider':
            return resolved.orientation === 'vertical'
              ? html`<div style="width:1px;background:rgba(0,0,0,0.08);align-self:stretch"></div>`
              : html`<div style="height:1px;background:rgba(0,0,0,0.08)"></div>`;
          case 'Image': return renderImage(resolved);
          case 'Badge': return renderBadge(resolved);
          case 'TextField': return renderTextField(resolved, emit);
          case 'ProgressBar': return renderProgressBar(resolved);
          case 'OptionsGrid': return renderOptions(resolved, emit);
          case 'RichMessageCard': return renderRichMessage(resolved, emit, headlineStreaming, rationaleStreaming);
          default: return html`<span class="missing">[unsupported: ${resolved.component}]</span>`;
        }
      }
      function isStreamingBinding(raw, surface) {
        return !!(raw && typeof raw === 'object' && typeof raw.path === 'string' &&
                  Object.keys(raw).length === 1 && surface.isStreaming(raw.path));
      }
      function renderText(c, streaming) {
        const v = c.variant ?? 'body';
        const text = c.text;
        if (text == null || text === '') {
          return html`<span class="text-shimmer ${v}"></span>`;
        }
        const cls = `t-${v}`;
        const caret = streaming ? html`<span class="caret"></span>` : nothing;
        if (v === 'h1') return html`<h1 class="${cls}">${text}${caret}</h1>`;
        if (v === 'h2') return html`<h2 class="${cls}">${text}${caret}</h2>`;
        return html`<p class="${cls}">${text}${caret}</p>`;
      }
      function renderButton(c, emit) {
        const ready = c.label && c.action?.event?.name;
        const v = c.variant ?? 'primary';
        return html`<button class="btn btn-${v}" ?disabled=${!ready}
          @click=${() => ready && emit(c.action.event.name, c.action.event.context ?? {}, c.label)}>
          ${ready ? c.label : html`<span class="text-shimmer btnlabel"></span>`}
        </button>`;
      }
      function renderOptions(c, emit) {
        const opts = c.options ?? [];
        return html`<div class="opts">
          ${c.prompt ? html`<p class="opts-prompt">${c.prompt}</p>` : nothing}
          ${opts.map(o => html`
            <button class="opt" @click=${() => emit(o.action.event.name, o.action.event.context ?? {}, o.label)}>
              ${o.emoji ? html`<span class="opt-emoji">${o.emoji}</span>` : nothing}
              <span class="opt-body">
                <span class="opt-label">${o.label ?? html`<span class="text-shimmer"></span>`}</span>
                ${o.rationale ? html`<span class="opt-rationale">${o.rationale}</span>` : nothing}
              </span>
            </button>`)}
        </div>`;
      }
      function renderRichMessage(c, emit, headlineStreaming, rationaleStreaming) {
        const t = c.recommendationType ?? 'strong';
        const tagLabel = { strong:'STRONG TAKE', positive:'POSITIVE', lifestyle:'LIFESTYLE',
          informational:'INFO', professional:'PROFESSIONAL', alternative:'ALTERNATIVE' }[t] ?? 'RECOMMENDATION';
        return html`<div class="rich rich-${t}">
          <div class="rich-meta">
            <span class="rich-tag">${tagLabel}</span>
            ${c.confidence ? html`<span class="rich-conf">${String(c.confidence).toUpperCase()} CONFIDENCE</span>` : nothing}
          </div>
          ${c.headline ? html`<h2 class="rich-headline">${c.headline}${headlineStreaming ? html`<span class="caret"></span>` : nothing}</h2>`
            : html`<h2 class="rich-headline"><span class="text-shimmer"></span></h2>`}
          ${c.rationale ? html`<p class="rich-rationale">${c.rationale}${rationaleStreaming ? html`<span class="caret"></span>` : nothing}</p>`
            : html`<p class="rich-rationale"><span class="text-shimmer"></span></p>`}
          <div class="rich-actions">
            ${actionBtn(c.confirmAction, 'primary', emit)}
            ${actionBtn(c.dismissAction, 'ghost', emit)}
          </div>
        </div>`;
      }
      function actionBtn(a, variant, emit) {
        if (!a) return nothing;
        const ready = a.label && a.event?.name;
        return html`<button class="btn btn-${variant}" ?disabled=${!ready}
          @click=${() => ready && emit(a.event.name, a.event.context ?? {}, a.label)}>
          ${ready ? a.label : html`<span class="text-shimmer btnlabel"></span>`}
        </button>`;
      }

      // --- extended components (Row, Divider, Image, Link, Badge, TextField, ProgressBar) ---
      function renderLink(c, emit) {
        const label = c.label ?? '';
        const url = c.url;
        const ev = c.action?.event;
        if (url) return html`<a class="a2ui-link" href="${url}" target="_blank" rel="noopener">${label}</a>`;
        if (ev?.name) {
          return html`<a class="a2ui-link" href="#" @click=${(e) => { e.preventDefault(); emit(ev.name, ev.context ?? {}, label); }}>${label}</a>`;
        }
        return html`<span class="muted">${label}</span>`;
      }
      function renderImage(c) {
        const src = c.src ?? '';
        const alt = c.alt ?? '';
        const radius = c.cornerRadius ?? 8;
        const maxHeight = c.maxHeight ?? 220;
        if (!src) return html`<span class="text-shimmer" style="width:200px"></span>`;
        return html`<img src="${src}" alt="${alt}" style="max-height:${maxHeight}px;max-width:100%;border-radius:${radius}px;display:block;object-fit:contain" />`;
      }
      function renderBadge(c) {
        const label = (c.label ?? '').toUpperCase();
        const v = c.variant ?? 'neutral';
        return html`<span class="badge badge-${v}">${label}</span>`;
      }
      function renderTextField(c, emit) {
        const label = c.label ?? '';
        const placeholder = c.placeholder ?? '';
        const ev = c.action?.event ?? { name: 'text_submitted', context: {} };
        return html`<label class="tf-wrap">
          ${label ? html`<span class="tf-label">${label}</span>` : nothing}
          <input class="tf" placeholder=${placeholder}
            @keydown=${(e) => {
              if (e.key === 'Enter') {
                const val = e.target.value.trim();
                if (!val) return;
                emit(ev.name, { ...(ev.context ?? {}), value: val }, val);
                e.target.value = '';
              }
            }} />
        </label>`;
      }
      function renderProgressBar(c) {
        const value = Math.max(0, Math.min(1, c.value ?? 0));
        const label = c.label;
        return html`<div class="pb-wrap">
          ${label ? html`<div class="pb-meta"><span>${label}</span><span>${Math.round(value * 100)}%</span></div>` : nothing}
          <div class="pb-track"><div class="pb-fill" style="width:${value * 100}%"></div></div>
        </div>`;
      }

      // ======================================================================
      // SECTION 9 — App
      // ======================================================================

        constructor() {
          super();
          this._tick = 0;
          this._composer = '';
          this._devOpen = false;
          this._loadStatus = 'loading';  // 'loading' | 'ready' | 'error'
          this._loadDetail = '';
          this.runtime = null;
        }

        async _bootstrap() {
          try {
            // Load catalog.json (metadata only — the runtime doesn't need it to
            // work, but seeing it validates there's a real schema doc backing
            // the shapes we render).
            const catalog = await loadCatalog();
            if (catalog) {
              this._loadDetail = `Loaded catalog ${catalog.catalogId} with ${Object.keys(catalog.components).length} component schemas.`;
            }
            // Load skills from /web/skills/*.md
            const skills = await loadSkillBundles(['greeting', 'planner', 'decider', 'critic']);
            // API key / proxy resolution
            let apiKey = '';
            if (!PROXY_URL) {
              apiKey = localStorage.getItem('a2ui_anthropic_key') || '';
              if (!apiKey) {
                apiKey = prompt('No proxy configured. Paste an Anthropic API key to run against api.anthropic.com directly (saved to localStorage).') || '';
                if (apiKey) localStorage.setItem('a2ui_anthropic_key', apiKey);
              }
            }
            this.runtime = new SkillRuntime({ skills, defaultSkillId: 'greeting', proxyUrl: PROXY_URL, apiKey });
            this._unsub = this.runtime.subscribe(() => { this._tick++; });
            // Log what was loaded so the wire-log panel shows provenance.
            this.runtime.wireLog.unshift({
              ts: Date.now(),
              msg: {
                info: {
                  loaded_catalog: catalog?.catalogId,
                  loaded_skills: Array.from(skills.keys()),
                  source: 'web/skills/*.md + catalog/catalog.json',
                },
              },
            });
            this._loadStatus = 'ready';
            this._tick++;
            this.runtime.primeGreeting();
          } catch (err) {
            console.error(err);
            this._loadStatus = 'error';
            this._loadDetail = String(err?.message || err);
            this._tick++;
          }
        }

        connectedCallback() {
          super.connectedCallback();
          this._bootstrap();
          this._scrollTimer = setInterval(() => {
            const t = this.renderRoot.querySelector('.transcript');
            if (t) t.scrollTop = t.scrollHeight;
          }, 120);
        }
        disconnectedCallback() {
          super.disconnectedCallback();
          this._unsub?.();
          clearInterval(this._scrollTimer);
        }

        emit = (name, context, echoLabel) => this.runtime?.handleUserEvent(name, context, echoLabel);

        send() {
          const t = this._composer.trim();
          if (!t || !this.runtime) return;
          this.runtime.handleUserText(t);
          this._composer = '';
        }

        render() {
          if (this._loadStatus === 'loading') {
            return html`<div class="boot-state"><div class="thinking"><span></span><span></span><span></span></div> <span class="muted">Loading catalog + SKILL.md files…</span></div>`;
          }
          if (this._loadStatus === 'error') {
            return html`<div class="boot-state" style="color:#c00"><strong>Failed to bootstrap:</strong> ${this._loadDetail}</div>`;
          }
          return html`
            <div class="main-col">
              <header class="top">
                <div class="brand">A2UI Web Starter</div>
                <div class="muted">client-side skills · Claude-powered${PROXY_URL ? ' · via proxy' : ' · direct'}</div>
              </header>
              <div class="transcript">
                <div class="transcript-inner">
                  ${this.runtime.turns.map(t => this._renderTurn(t))}
                  ${this.runtime.lastError ? html`<p class="muted" style="color:#c00">${this.runtime.lastError}</p>` : nothing}
                </div>
              </div>
              <footer class="bottom">
                <div class="composer">
                  <input .value=${this._composer}
                    @input=${(e) => this._composer = e.target.value}
                    @keydown=${(e) => { if (e.key === 'Enter') this.send(); }}
                    placeholder="Type anything…" />
                  <button @click=${() => this.send()}>Send</button>
                </div>
              </footer>
            </div>
            <aside class="dev-col ${this._devOpen ? 'open' : ''}">
              <div class="dev-header">
                <div>
                  <div class="dev-title">A2UI Wire Log</div>
                  <div class="dev-sub">Every message the runtime produces, in v0.9 format.</div>
                </div>
                <button class="dev-close" @click=${() => this._devOpen = false} title="Close">×</button>
              </div>
              <div class="dev-list">
                ${this.runtime.wireLog.slice().reverse().slice(0, 120).map(entry => html`
                  <div class="dev-entry">
                    <div class="dev-when">${new Date(entry.ts).toLocaleTimeString()} · ${Object.keys(entry.msg).filter(k => k !== 'version').join(', ')}</div>
                    <div class="dev-json">${this._highlight(JSON.stringify(entry.msg, null, 2))}</div>
                  </div>
                `)}
                ${this.runtime.wireLog.length === 0 ? html`<div class="muted">No messages yet. Tap an option to see A2UI flow.</div>` : nothing}
              </div>
            </aside>
            ${this._devOpen ? nothing : html`<button class="dev-toggle" @click=${() => this._devOpen = true}>Show A2UI wire log</button>`}
          `;
        }

        _highlight(s) {
          // Lit's html` template auto-escapes interpolations, so we can't return
          // raw HTML. Use unsafeHTML would be heavier; for dev view we skip
          // syntax highlighting and just return the text verbatim.
          return s;
        }
        _renderTurn(turn) {
          if (turn.kind === 'user')      return html`<div class="turn-user">${turn.text}</div>`;
          if (turn.kind === 'userPill')  return html`<div class="turn-userPill">${turn.label}</div>`;
          if (turn.kind === 'thinking')  return html`<div class="thinking"><span></span><span></span><span></span></div>`;
          // agent
          const s = this.runtime.surfaces.get(turn.surfaceId);
          if (!s?.components.has('root')) {
            return html`<div class="thinking"><span></span><span></span><span></span></div>`;
          }
          return renderComponent('root', s, this.emit);
        }
      }
      customElements.define('a2ui-starter', A2UIStarter);
    </script>
  </body>
</html>

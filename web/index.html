<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2UI Web Starter — client-side skills, Claude-powered, rendered by @a2ui/lit</title>
    <meta name="description" content="Reference client-side A2UI host for the browser. Uses the official @a2ui/lit renderer + basicCatalog. LLM via a local or hosted proxy." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; font-family: Inter, system-ui, sans-serif; background: #fafafa; color: #111; }
      #app { height: 100%; }

      /* Minimal theming for the official @a2ui/lit basicCatalog via its CSS vars */
      :root {
        --a2ui-font-family: Inter, system-ui, sans-serif;
        --a2ui-color-primary: #111;
        --a2ui-color-on-primary: #fff;
        --a2ui-color-border: rgba(0,0,0,0.08);
        --a2ui-border-radius: 10px;
        --a2ui-border-width: 1px;
        --a2ui-spacing-xs: 4px;
        --a2ui-spacing-s: 8px;
        --a2ui-spacing-m: 12px;
        --a2ui-spacing-l: 16px;
        --a2ui-font-size-s: 13px;
        --a2ui-font-size-m: 15px;
        --a2ui-font-size-l: 19px;
        --a2ui-button-background: #111;
        --a2ui-button-color: #fff;
        --a2ui-button-border-radius: 10px;
        --a2ui-button-padding: 10px 16px;
        --a2ui-card-padding: 16px;
        --a2ui-card-margin: 0;
        --a2ui-card-box-shadow: none;
      }
    </style>
  </head>
  <body>
    <div id="app"><a2ui-starter></a2ui-starter></div>

    <script type="importmap">
    { "imports": {
        "lit": "https://esm.sh/lit@3.2.0",
        "lit/decorators.js": "https://esm.sh/lit@3.2.0/decorators.js",
        "js-yaml": "https://esm.sh/js-yaml@4.1.0",
        "@a2ui/web_core/v0_9": "https://esm.sh/@a2ui/web_core@0.9.2/v0_9",
        "@a2ui/lit/v0_9": "https://esm.sh/@a2ui/lit@0.9.3/v0_9"
    } }
    </script>

    <script type="module">
      import { LitElement, css, html, nothing } from 'lit';
      import yaml from 'js-yaml';
      import { MessageProcessor } from '@a2ui/web_core/v0_9';
      // Importing @a2ui/lit registers the <a2ui-surface> custom element + all
      // basicCatalog component elements (A2uiText, A2uiButton, etc.).
      import { basicCatalog } from '@a2ui/lit/v0_9';
      import '@a2ui/lit/v0_9';

      // ====================================================================
      // Configuration
      //   PROXY_URL — where to post LLM requests. Defaults to local proxy
      //               when served from localhost. Override via ?proxy= or
      //               window.A2UI_PROXY_URL.
      //   SMOOTH_CPS — optional client-side typewriter pacing. Anthropic SSE
      //                delivers 30–150 char chunks; SMOOTH_CPS splits each
      //                chunk into per-char appends for a visible typing feel.
      //                Set 0 to disable (text lands in raw server chunks).
      // ====================================================================
      const urlOverride = new URLSearchParams(location.search).get('proxy');
      const isLocal = ['localhost', '127.0.0.1'].includes(location.hostname);
      const PROXY_URL = window.A2UI_PROXY_URL || urlOverride || (isLocal ? 'http://localhost:8787' : '');
      const MODEL = 'claude-sonnet-4-5';
      const SMOOTH_CPS = Number(new URLSearchParams(location.search).get('smooth') ?? '220');

      // ====================================================================
      // LLM: plain-text streaming through a proxy (hides API key)
      // ====================================================================
      async function* streamAnthropicViaProxy({ systemPrompt, userMessage, history, fields, proxyUrl, apiKey }) {
        const tagTemplate = fields.map(f => `<${f.name}>${f.description.trim()}</${f.name}>`).join('\n');
        const fullSystem = systemPrompt + `

## RESPONSE FORMAT

Output ONLY the XML-tagged response below, filled in. No preamble, no
commentary, no markdown code fences. Tags in the exact order shown.

${tagTemplate}

The descriptions above are INSTRUCTIONS for what to write inside each tag —
replace them with your actual content.`;

        const headers = { 'Content-Type': 'application/json' };
        if (apiKey) { headers['x-api-key'] = apiKey; headers['anthropic-version'] = '2023-06-01'; }

        const body = JSON.stringify({
          model: MODEL, max_tokens: 1024, system: fullSystem,
          messages: [
            ...history.map(h => ({ role: h.role, content: h.text })),
            { role: 'user', content: userMessage },
          ],
          stream: true,
        });

        const url = proxyUrl ? `${proxyUrl.replace(/\/$/, '')}/v1/messages` : 'https://api.anthropic.com/v1/messages';
        const resp = await fetch(url, { method: 'POST', headers, body });
        if (!resp.ok) throw new Error(`LLM endpoint error ${resp.status}: ${(await resp.text()).slice(0, 200)}`);

        const parser = new FieldParser(fields.map(f => f.name));
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          let nl;
          while ((nl = buf.indexOf('\n')) !== -1) {
            const line = buf.slice(0, nl); buf = buf.slice(nl + 1);
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6).trim();
            if (payload === '[DONE]') continue;
            try {
              const ev = JSON.parse(payload);
              if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta' && ev.delta.text) {
                for (const d of parser.feed(ev.delta.text)) yield d;
              }
            } catch {/* partial SSE line */}
          }
        }
        for (const d of parser.finish()) yield d;
      }

      // ====================================================================
      // FieldParser — extracts <field>...</field> blocks from a streaming
      // text source. Hold-back only reserves chars that could be a prefix of
      // the closing tag, so non-tag-like content streams freely.
      // ====================================================================
      class FieldParser {
        constructor(fieldNames) {
          this.fieldNames = new Set(fieldNames);
          this.buffer = ''; this.currentField = null;
          this.currentValue = ''; this.lastEmitted = '';
        }
        feed(delta) {
          this.buffer += delta;
          const out = [];
          while (true) {
            if (this.currentField == null) {
              const lt = this.buffer.indexOf('<');
              if (lt === -1) { this.buffer = ''; return out; }
              const gt = this.buffer.indexOf('>', lt);
              if (gt === -1) { this.buffer = this.buffer.slice(lt); return out; }
              const tag = this.buffer.slice(lt + 1, gt);
              if (this.fieldNames.has(tag)) {
                this.currentField = tag; this.currentValue = ''; this.lastEmitted = '';
                this.buffer = this.buffer.slice(gt + 1);
              } else {
                this.buffer = this.buffer.slice(gt + 1);
              }
            } else {
              const closing = `</${this.currentField}>`;
              const closeIdx = this.buffer.indexOf(closing);
              if (closeIdx !== -1) {
                this.currentValue += this.buffer.slice(0, closeIdx);
                const chunk = this.currentValue.slice(this.lastEmitted.length);
                out.push({ fieldName: this.currentField, accumulatedValue: this.currentValue, chunkValue: chunk, isFinal: true });
                this.buffer = this.buffer.slice(closeIdx + closing.length);
                this.currentField = null; this.currentValue = ''; this.lastEmitted = '';
                continue;
              }
              const maxHold = Math.min(closing.length - 1, this.buffer.length);
              let hold = 0;
              for (let h = maxHold; h >= 1; h--) {
                if (closing.startsWith(this.buffer.slice(-h))) { hold = h; break; }
              }
              if (this.buffer.length > hold) {
                const commit = this.buffer.slice(0, this.buffer.length - hold);
                this.currentValue += commit;
                this.buffer = this.buffer.slice(this.buffer.length - hold);
                if (this.currentValue !== this.lastEmitted) {
                  const chunk = this.currentValue.slice(this.lastEmitted.length);
                  out.push({ fieldName: this.currentField, accumulatedValue: this.currentValue, chunkValue: chunk, isFinal: false });
                  this.lastEmitted = this.currentValue;
                }
              }
              return out;
            }
          }
        }
        finish() {
          const out = [];
          if (this.currentField != null) {
            this.currentValue += this.buffer;
            if (this.currentValue !== this.lastEmitted) {
              const chunk = this.currentValue.slice(this.lastEmitted.length);
              out.push({ fieldName: this.currentField, accumulatedValue: this.currentValue, chunkValue: chunk, isFinal: true });
            }
            this.currentField = null; this.buffer = '';
          }
          return out;
        }
      }

      // ====================================================================
      // SKILL.md + catalog loaders
      //   Skills are real .md files under /web/skills/ with YAML frontmatter
      //   Component catalog (documentation shape) lives at /catalog/catalog.json
      //   — note: the actual renderer uses the basicCatalog from @a2ui/lit;
      //   our catalog.json is kept for the ecosystem-manifest story.
      // ====================================================================
      function parseSkillMarkdown(md) {
        const m = /^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/.exec(md);
        if (!m) throw new Error('SKILL.md missing frontmatter fence');
        const fm = yaml.load(m[1]) || {};
        const body = m[2] || '';
        if (!fm.name) throw new Error('SKILL.md missing `name`');
        return {
          name: fm.name,
          description: fm.description || '',
          triggers: fm.triggers || [],
          body,
          skeleton: fm.first_turn_skeleton?.components || null,
          fillFields: fm.first_turn_fill_fields
            ? Object.entries(fm.first_turn_fill_fields).map(([k, v]) => ({
                name: k, description: (v?.description ?? v ?? '').trim(),
              }))
            : null,
        };
      }

      async function loadSkillBundles(ids) {
        const all = await Promise.all(ids.map(async id => {
          const r = await fetch(`./skills/${id}.md`);
          if (!r.ok) throw new Error(`skills/${id}.md: HTTP ${r.status}`);
          return parseSkillMarkdown(await r.text());
        }));
        const m = new Map();
        for (const s of all) m.set(s.name, s);
        return m;
      }

      async function loadCatalogManifest() {
        try { const r = await fetch('../catalog/catalog.json'); return r.ok ? await r.json() : null; }
        catch { return null; }
      }

      // ====================================================================
      // SkillRuntime — produces A2UI v0.9 wire messages and feeds them into
      // MessageProcessor. Rendering happens via <a2ui-surface> bound to each
      // SurfaceModel from processor.model.surfacesMap.
      // ====================================================================
      class SkillRuntime {
        constructor({ skills, defaultSkillId, proxyUrl, apiKey = '' }) {
          this.skills = skills;
          this.defaultSkillId = defaultSkillId;
          this.activeSkillId = defaultSkillId;
          this.proxyUrl = proxyUrl;
          this.apiKey = apiKey;

          // Official message processor — owns all A2UI surfaces + catalogs.
          // basicCatalog ships 18 components: Text, Button, Card, Column, Row,
          // List, Image, Icon, Video, AudioPlayer, TextField, CheckBox,
          // Slider, DateTimeInput, ChoicePicker, Tabs, Modal, Divider.
          this.processor = new MessageProcessor([basicCatalog], async (action) => {
            // A client-side action fired from within a rendered surface.
            // Shape: { surfaceId, event: { name, context? } }
            const ev = action?.event || {};
            const name = ev.name;
            if (!name) return;
            // Echo the user's tap in the transcript
            // Our Button children are Text components — we don't get the label
            // string back in the action, so derive a sensible pill from the
            // event name.
            const echoLabel = prettyLabelFor(name);
            this.turns.push({ kind: 'userPill', label: echoLabel });
            this.turns.push({ kind: 'thinking', id: `t_${Date.now()}` });
            this.emit();
            await this._processTurn({
              userMessage: `User tapped ${name}.`,
              eventName: name,
            });
          });

          this.turns = [];
          this.history = [];
          this.counter = 0;
          this.listeners = new Set();
          this.lastError = null;
          this.wireLog = [];
          // Subscribe to surface creation so the UI knows when new surfaces
          // land (each agent turn creates a new surface id).
          this.processor.onSurfaceCreated(() => this.emit());
        }

        subscribe(fn) { this.listeners.add(fn); return () => this.listeners.delete(fn); }
        emit() { for (const l of this.listeners) l(); }

        _send(messages) {
          // Log each wire message for the dev panel, then hand to the
          // official processor which updates SurfaceModels + triggers re-render.
          for (const m of messages) this.wireLog.push({ ts: Date.now(), msg: m });
          if (this.wireLog.length > 400) this.wireLog.splice(0, this.wireLog.length - 400);
          this.processor.processMessages(messages);
        }

        primeGreeting() {
          const g = this.skills.get(this.defaultSkillId);
          if (!g?.skeleton) return;
          this._send([
            { version: 'v0.9', createSurface: { surfaceId: 'greeting', catalogId: basicCatalog.id || 'a2ui/core@1.0' } },
            { version: 'v0.9', updateComponents: { surfaceId: 'greeting', components: g.skeleton } },
          ]);
          this.turns.push({ kind: 'agent', surfaceId: 'greeting' });
          this.emit();
        }

        // Free-text composer entry point (text input at bottom).
        handleUserText(text) {
          this.turns.push({ kind: 'user', text });
          this.turns.push({ kind: 'thinking', id: `t_${Date.now()}` });
          this.emit();
          this._processTurn({ userMessage: text, eventName: null });
        }

        async _processTurn({ userMessage, eventName }) {
          // Route
          if (eventName === 'restart') this.activeSkillId = this.defaultSkillId;
          else if (eventName) {
            for (const s of this.skills.values()) {
              if (s.triggers?.includes(eventName)) { this.activeSkillId = s.name; break; }
            }
          }
          const skill = this.skills.get(this.activeSkillId);
          if (!skill) return;

          this.counter++;
          const sid = `msg_${this.counter}`;

          if (skill.skeleton && skill.fillFields && skill.triggers.includes(eventName)) {
            this._send([
              { version: 'v0.9', createSurface: { surfaceId: sid, catalogId: basicCatalog.id || 'a2ui/core@1.0' } },
              { version: 'v0.9', updateComponents: { surfaceId: sid, components: skill.skeleton } },
            ]);
            this._replaceThinking(sid);
            this.emit();
            await this._streamFill(skill, sid, userMessage);
          } else {
            // Fallback: a single bound Text body.
            const fallbackComponents = [
              { id: 'hdr', component: 'Text', variant: 'body', text: { path: '/reply/body' } },
              { id: 'root', component: 'Column', children: ['hdr'] },
            ];
            this._send([
              { version: 'v0.9', createSurface: { surfaceId: sid, catalogId: basicCatalog.id || 'a2ui/core@1.0' } },
              { version: 'v0.9', updateComponents: { surfaceId: sid, components: fallbackComponents } },
            ]);
            this._replaceThinking(sid);
            this.emit();
            await this._streamFill(skill, sid, userMessage, [
              { name: 'body', description: 'A direct, helpful reply. Plain prose, no markdown.' },
            ]);
          }
          this.history.push({ role: 'user', text: userMessage });
        }

        _replaceThinking(surfaceId) {
          for (let i = this.turns.length - 1; i >= 0; i--) {
            if (this.turns[i].kind === 'thinking') {
              this.turns[i] = { kind: 'agent', surfaceId };
              return;
            }
          }
          this.turns.push({ kind: 'agent', surfaceId });
        }

        async _streamFill(skill, surfaceId, userMessage, fieldsOverride = null) {
          const fields = fieldsOverride || skill.fillFields;
          const systemPrompt = skill.body;
          const finalVals = {};
          try {
            for await (const delta of streamAnthropicViaProxy({
              systemPrompt, userMessage, history: this.history, fields,
              proxyUrl: this.proxyUrl, apiKey: this.apiKey,
            })) {
              const path = `/reply/${delta.fieldName}`;
              await this._applyChunkSmoothly({
                surfaceId, path, chunk: delta.chunkValue, streaming: !delta.isFinal,
              });
              finalVals[delta.fieldName] = delta.accumulatedValue;
            }
          } catch (e) {
            this.lastError = String(e.message || e);
            this.emit();
          }
          const historyText = Object.entries(finalVals).map(([k, v]) => `${k}: ${v}`).join('\n');
          if (historyText) this.history.push({ role: 'assistant', text: historyText });
        }

        async _applyChunkSmoothly({ surfaceId, path, chunk, streaming }) {
          if (!chunk) return;
          // Record the aggregate chunk as one wire log entry (reflects the
          // actual server-sent chunk), then optionally replay per-char for
          // visible typewriter pacing.
          const msg = {
            version: 'v0.9',
            updateDataModel: { surfaceId, path, patch: 'append', value: chunk, streaming },
          };
          this.wireLog.push({ ts: Date.now(), msg });
          if (this.wireLog.length > 400) this.wireLog.splice(0, this.wireLog.length - 400);

          if (SMOOTH_CPS <= 0) {
            this.processor.processMessages([msg]);
            this.emit();
            return;
          }
          const delayMs = Math.max(1, Math.floor(1000 / SMOOTH_CPS));
          for (let i = 0; i < chunk.length; i++) {
            const isLastChar = i === chunk.length - 1;
            this.processor.processMessages([{
              version: 'v0.9',
              updateDataModel: {
                surfaceId, path, patch: 'append', value: chunk[i],
                streaming: streaming || !isLastChar,
              },
            }]);
            this.emit();
            if (!isLastChar) await new Promise(r => setTimeout(r, delayMs));
          }
        }
      }

      function prettyLabelFor(eventName) {
        return eventName.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      }

      // ====================================================================
      // App shell
      // ====================================================================
      class A2UIStarter extends LitElement {
        static properties = {
          _tick: { state: true }, _composer: { state: true }, _devOpen: { state: true },
          _loadStatus: { state: true }, _loadDetail: { state: true },
        };
        static styles = css`
          :host { display: grid; grid-template-columns: 1fr auto; height: 100%; max-width: 1200px; margin: 0 auto; }
          .main-col { display: flex; flex-direction: column; min-width: 0; max-width: 720px; margin: 0 auto; width: 100%; }
          header.top { padding: 16px 20px; border-bottom: 1px solid rgba(0,0,0,0.06); display: flex; align-items: center; justify-content: space-between; background: #fff; }
          .brand { font-weight: 700; font-size: 18px; letter-spacing: -0.01em; }
          .muted { font-size: 12px; color: #666; }
          .transcript { flex: 1; overflow-y: auto; padding: 24px 20px 20px; }
          .transcript-inner { display: flex; flex-direction: column; gap: 20px; }
          .turn-user     { align-self: flex-end; max-width: 80%; padding: 10px 14px; border-radius: 18px 18px 4px 18px; background: #111; color: #fff; }
          .turn-userPill { align-self: flex-end; max-width: 80%; padding: 8px 12px; border-radius: 18px 18px 4px 18px; background: #e5e5e5; color: #111; font-style: italic; }
          .thinking { display: flex; gap: 6px; padding: 10px 0; align-self: flex-start; }
          .thinking span { width: 8px; height: 8px; border-radius: 50%; background: #bbb; animation: bounce 1.2s infinite; }
          .thinking span:nth-child(2) { animation-delay: .15s; }
          .thinking span:nth-child(3) { animation-delay: .30s; }
          @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity: .4; } 40% { transform: translateY(-5px); opacity: 1; } }
          footer.bottom { border-top: 1px solid rgba(0,0,0,0.06); padding: 14px 20px; background: #fff; }
          .composer { display: flex; gap: 8px; }
          .composer input { flex: 1; padding: 12px 14px; border-radius: 12px; border: 1px solid #ddd; font: inherit; }
          .composer button { padding: 12px 18px; border-radius: 12px; border: none; background: #111; color: #fff; cursor: pointer; font: inherit; }

          .dev-col { width: 0; overflow: hidden; transition: width 0.18s ease; background: #1a1f2b; color: #c5cbd4; display: flex; flex-direction: column; }
          .dev-col.open { width: 380px; }
          .dev-header { padding: 12px 14px; display: flex; align-items: flex-start; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.08); gap: 12px; }
          .dev-title { font: 600 13px/1 Inter; color: #fff; letter-spacing: 0.02em; }
          .dev-sub   { font: 11px/1.4 Inter; color: #8892a8; margin-top: 4px; }
          .dev-close { background: transparent; border: none; color: #8892a8; cursor: pointer; font-size: 16px; padding: 4px 8px; }
          .dev-close:hover { color: #fff; }
          .dev-list  { flex: 1; overflow-y: auto; padding: 8px 10px; font: 11.5px/1.5 "JetBrains Mono", ui-monospace, monospace; }
          .dev-entry { margin-bottom: 8px; }
          .dev-when  { color: #7a839a; font-size: 10px; }
          .dev-json  { white-space: pre-wrap; word-break: break-word; color: #d9dee8; }
          .dev-toggle {
            position: fixed; top: 16px; right: 16px; z-index: 10;
            padding: 8px 12px; font: 500 12px Inter; background: #1a1f2b; color: #fff;
            border: none; border-radius: 8px; cursor: pointer; opacity: 0.85;
          }
          .dev-toggle:hover { opacity: 1; }
          .boot-state { display: flex; align-items: center; gap: 12px; padding: 40px; justify-content: center; grid-column: 1 / -1; }

          /* Agent turn: a surface is rendered by <a2ui-surface>. Give it sensible defaults. */
          .agent-wrap { width: 100%; }
          .agent-wrap a2ui-surface { display: block; }
        `;

        constructor() {
          super();
          this._tick = 0; this._composer = ''; this._devOpen = false;
          this._loadStatus = 'loading'; this._loadDetail = '';
          this.runtime = null;
        }

        async _bootstrap() {
          try {
            const catalog = await loadCatalogManifest();
            const skills = await loadSkillBundles(['greeting', 'planner', 'decider', 'critic']);

            let apiKey = '';
            if (!PROXY_URL) {
              apiKey = localStorage.getItem('a2ui_anthropic_key') || '';
              if (!apiKey) {
                apiKey = prompt('No proxy configured. Paste an Anthropic API key to run against api.anthropic.com directly (saved to localStorage).') || '';
                if (apiKey) localStorage.setItem('a2ui_anthropic_key', apiKey);
              }
            }
            this.runtime = new SkillRuntime({ skills, defaultSkillId: 'greeting', proxyUrl: PROXY_URL, apiKey });
            this._unsub = this.runtime.subscribe(() => { this._tick++; });

            this.runtime.wireLog.unshift({
              ts: Date.now(),
              msg: {
                info: {
                  renderer: '@a2ui/lit v0.9 (official) · basicCatalog (18 components)',
                  state: '@a2ui/web_core v0.9 · MessageProcessor + SurfaceGroupModel',
                  loaded_catalog_manifest: catalog?.catalogId,
                  loaded_skills: Array.from(skills.keys()),
                  source: 'web/skills/*.md',
                },
              },
            });
            this._loadStatus = 'ready';
            this.runtime.primeGreeting();
          } catch (e) {
            console.error(e);
            this._loadStatus = 'error';
            this._loadDetail = String(e?.message || e);
          }
          this._tick++;
        }

        connectedCallback() {
          super.connectedCallback();
          this._bootstrap();
          this._scrollTimer = setInterval(() => {
            const t = this.renderRoot.querySelector('.transcript');
            if (t) t.scrollTop = t.scrollHeight;
          }, 120);
        }
        disconnectedCallback() {
          super.disconnectedCallback();
          this._unsub?.();
          clearInterval(this._scrollTimer);
        }

        send() {
          const t = this._composer.trim();
          if (!t || !this.runtime) return;
          this.runtime.handleUserText(t);
          this._composer = '';
        }

        render() {
          if (this._loadStatus === 'loading') {
            return html`<div class="boot-state"><div class="thinking"><span></span><span></span><span></span></div><span class="muted">Loading @a2ui/web_core, @a2ui/lit, catalog manifest + SKILL.md files…</span></div>`;
          }
          if (this._loadStatus === 'error') {
            return html`<div class="boot-state" style="color:#c00"><strong>Bootstrap failed:</strong> ${this._loadDetail}</div>`;
          }
          return html`
            <div class="main-col">
              <header class="top">
                <div class="brand">A2UI Web Starter</div>
                <div class="muted">client-side skills · Claude-powered · rendered by @a2ui/lit${PROXY_URL ? ' · via proxy' : ' · direct'}</div>
              </header>
              <div class="transcript">
                <div class="transcript-inner">
                  ${this.runtime.turns.map(t => this._renderTurn(t))}
                  ${this.runtime.lastError ? html`<p class="muted" style="color:#c00">${this.runtime.lastError}</p>` : nothing}
                </div>
              </div>
              <footer class="bottom">
                <div class="composer">
                  <input .value=${this._composer}
                    @input=${(e) => this._composer = e.target.value}
                    @keydown=${(e) => { if (e.key === 'Enter') this.send(); }}
                    placeholder="Type anything…" />
                  <button @click=${() => this.send()}>Send</button>
                </div>
              </footer>
            </div>
            <aside class="dev-col ${this._devOpen ? 'open' : ''}">
              <div class="dev-header">
                <div>
                  <div class="dev-title">A2UI Wire Log</div>
                  <div class="dev-sub">Messages this client generates and feeds into <code>@a2ui/web_core</code>'s MessageProcessor. The surface you see is rendered from that processor's state by <code>&lt;a2ui-surface&gt;</code>.</div>
                </div>
                <button class="dev-close" @click=${() => this._devOpen = false} title="Close">×</button>
              </div>
              <div class="dev-list">
                ${this.runtime.wireLog.slice().reverse().slice(0, 120).map(entry => html`
                  <div class="dev-entry">
                    <div class="dev-when">${new Date(entry.ts).toLocaleTimeString()} · ${Object.keys(entry.msg).filter(k => k !== 'version').join(', ')}</div>
                    <div class="dev-json">${JSON.stringify(entry.msg, null, 2)}</div>
                  </div>
                `)}
                ${this.runtime.wireLog.length === 0 ? html`<div class="muted">No messages yet.</div>` : nothing}
              </div>
            </aside>
            ${this._devOpen ? nothing : html`<button class="dev-toggle" @click=${() => this._devOpen = true}>Show A2UI wire log</button>`}
          `;
        }

        _renderTurn(turn) {
          if (turn.kind === 'user')     return html`<div class="turn-user">${turn.text}</div>`;
          if (turn.kind === 'userPill') return html`<div class="turn-userPill">${turn.label}</div>`;
          if (turn.kind === 'thinking') return html`<div class="thinking"><span></span><span></span><span></span></div>`;
          // agent — render via the official <a2ui-surface>.
          const surface = this.runtime.processor.model.getSurface(turn.surfaceId);
          if (!surface) return html`<div class="thinking"><span></span><span></span><span></span></div>`;
          return html`<div class="agent-wrap"><a2ui-surface .surface=${surface}></a2ui-surface></div>`;
        }
      }
      customElements.define('a2ui-starter', A2UIStarter);
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2UI Web Starter — official renderer, custom catalog, client-side skills</title>
    <meta name="description" content="Reference client-side A2UI host. Uses @a2ui/web_core MessageProcessor and @a2ui/lit renderer, extended with two custom components. Skills in SKILL.md; Claude via thin proxy." />

    <!-- Social preview + favicon. Both are inline so the app stays
         single-file / zero-asset and remains drop-in for any static host. -->
    <meta property="og:title" content="A2UI Web Starter — client-side agent in the browser" />
    <meta property="og:description" content="Uses Google's official @a2ui/web_core + @a2ui/lit, extended with a custom catalog. Claude via a Cloudflare Worker proxy. No bundler." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vpm238.github.io/a2ui-starter-web/" />
    <meta name="twitter:card" content="summary" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232e5cff'/%3E%3Ctext x='16' y='22' font-family='Inter,system-ui,sans-serif' font-size='15' font-weight='700' fill='white' text-anchor='middle'%3EA2%3C/text%3E%3C/svg%3E" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; font-family: Inter, system-ui, sans-serif; background: #fafafa; color: #111; }
      #app { height: 100%; }

      /* A2UI renderer uses CSS custom properties — set them app-wide so both
         basicCatalog components and our extensions pick up the same palette. */
      :root {
        --a2ui-font-family: Inter, system-ui, sans-serif;
        --a2ui-font-family-title: Inter, system-ui, sans-serif;
        --a2ui-color-background: #ffffff;
        --a2ui-color-on-background: #111111;
        --a2ui-color-primary: #111111;
        --a2ui-color-on-primary: #ffffff;
        --a2ui-color-secondary: #f5f5f5;
        --a2ui-color-on-secondary: #111111;
        --a2ui-color-border: rgba(0,0,0,0.08);
        --a2ui-color-accent: #2e5cff;
        --a2ui-border-radius: 10px;
        --a2ui-border-width: 1px;
        --a2ui-spacing-xs: 4px;
        --a2ui-spacing-s: 8px;
        --a2ui-spacing-m: 12px;
        --a2ui-spacing-l: 16px;
        --a2ui-spacing-xl: 24px;
      }
    </style>
  </head>
  <body>
    <div id="app"><a2ui-starter></a2ui-starter></div>

    <!--
      Deployed proxy URL. Forks should edit this (or delete the line to fall
      back to the localhost default, or set window.A2UI_PROXY_URL elsewhere).
      Keeps the ANTHROPIC_API_KEY on the Cloudflare Worker, not in the browser.
    -->
    <script>window.A2UI_PROXY_URL = 'https://a2ui-llm-proxy.vpm238.workers.dev';</script>

    <script type="importmap">
    { "imports": {
        "lit": "https://esm.sh/lit@3.2.0",
        "lit/decorators.js": "https://esm.sh/lit@3.2.0/decorators.js",
        "@a2ui/web_core/v0_9": "https://esm.sh/@a2ui/web_core@0.9.2/v0_9",
        "@a2ui/lit/v0_9": "https://esm.sh/@a2ui/lit@0.9.3/v0_9",
        "zod": "https://esm.sh/zod@3.25.76",
        "js-yaml": "https://esm.sh/js-yaml@4.1.0"
    } }
    </script>

    <script type="module">
      // ==================================================================
      // A2UI Web Starter — architecture at a glance
      //
      //   +-----------------------------------------------------------+
      //   |   A2UIStarter (Lit)  — chat shell: transcript + composer  |
      //   +-----------------------------------------------------------+
      //                           |
      //                           v
      //   +-----------------------------------------------------------+
      //   |   SkillRuntime        — routes events to skills, drives  |
      //   |                         LLM streaming, emits v0.9 msgs   |
      //   +-----------------------------------------------------------+
      //                           |  processMessages([...])
      //                           v
      //   +-----------------------------------------------------------+
      //   |   @a2ui/web_core MessageProcessor — state machine,        |
      //   |   validates against starterCatalog (zod), owns surfaces.  |
      //   +-----------------------------------------------------------+
      //                           |  renders via
      //                           v
      //   +-----------------------------------------------------------+
      //   |   <a2ui-surface>  — from @a2ui/lit. Recursively renders   |
      //   |   components registered in starterCatalog.                |
      //   +-----------------------------------------------------------+
      //
      //   starterCatalog = basicCatalog(18) + OptionsGrid + RichMessageCard
      //   All three packages are loaded from esm.sh — no bundler.
      //
      //   Skills live as SKILL.md files in /skills/. Catalog schemas
      //   live inline here (zod) since the renderer needs the zod objects
      //   at runtime.
      //
      //   Every message produced by the SkillRuntime is also appended
      //   to a wire-log panel so you can watch the A2UI protocol flow
      //   live while the app runs.
      // ==================================================================

      import { LitElement, css, html, nothing } from 'lit';
      import { customElement } from 'lit/decorators.js';
      import { MessageProcessor, Catalog } from '@a2ui/web_core/v0_9';
      // Importing the package registers the <a2ui-surface> custom element
      // and all of basicCatalog's element classes via their @customElement
      // decorators. No explicit customElements.define() calls needed.
      import { A2uiLitElement, A2uiController, basicCatalog } from '@a2ui/lit/v0_9';
      import { z } from 'zod';
      import yaml from 'js-yaml';

      // ==================================================================
      // Configuration
      // ==================================================================
      const urlOverride = new URLSearchParams(location.search).get('proxy');
      const isLocal = ['localhost', '127.0.0.1'].includes(location.hostname);
      const PROXY_URL = window.A2UI_PROXY_URL || urlOverride || (isLocal ? 'http://localhost:8787' : '');
      const MODEL = 'claude-sonnet-4-5';

      // Client-side typewriter smoothing. Anthropic SSE delivers text in big
      // chunks (30–150 chars each). When > 0, we split each chunk into
      // shorter updateDataModel sets paced at this rate, which feels like
      // typing instead of popping. Set 0 to disable. Override via ?smooth=N.
      const SMOOTH_CPS = Number(new URLSearchParams(location.search).get('smooth') ?? '220');
      const STARTER_CATALOG_ID = 'a2ui-starter/core@0.1';

      // ==================================================================
      // SECTION 1 — Custom catalog extensions
      //
      // Two components the basicCatalog doesn't ship: OptionsGrid (tap-to-
      // fire events) and RichMessageCard (opinionated recommendation card).
      // Each one is:
      //   * A zod schema for validation + auto-binding by GenericBinder
      //   * A Lit element extending A2uiLitElement
      //   * An exported { name, schema, tagName } descriptor for the Catalog
      //
      // The controller auto-resolves {path: '/...'} bindings and converts
      // any union containing `{event: {name, context}}` into a callable
      // function that dispatches through the surface.
      // ==================================================================

      // Reusable primitives — mirror shapes from @a2ui/web_core/basic_catalog
      // so path bindings and event actions work identically.
      const PathBinding = z.object({ path: z.string() });
      const DynString = z.union([z.string(), PathBinding]);
      const EventAction = z.object({
        event: z.object({
          name: z.string(),
          context: z.record(z.union([
            z.string(), z.number(), z.boolean(),
            z.array(z.any()), PathBinding,
          ])).optional(),
        }),
      });
      // Wrapping in a union is how the binder detects "this is an Action
      // field" — scrapeSchemaBehavior() looks for a ZodUnion whose options
      // include an object with an `event` shape.
      const ActionSchema = z.union([EventAction]);

      // ---- OptionsGrid -------------------------------------------------
      // Stacked list of tappable options. Each option has a label,
      // optional rationale, optional emoji, and a required action. Each
      // option is auto-bound: label/rationale can be {path:...} bindings.
      const OptionsGridApi = {
        name: 'OptionsGrid',
        schema: z.object({
          prompt: DynString.optional(),
          options: z.array(z.object({
            id: z.string(),
            label: DynString,
            rationale: DynString.optional(),
            emoji: z.string().optional(),
            action: ActionSchema,
          })),
        }).strict(),
      };

      class A2uiOptionsGridElement extends A2uiLitElement {
        static styles = css`
          :host { display: block; margin: var(--a2ui-spacing-m, 12px) 0; }
          .prompt { font: 500 14px/1.3 var(--a2ui-font-family, inherit); color: #555; margin: 0 0 8px; }
          .list { display: flex; flex-direction: column; gap: 8px; }
          .opt {
            display: flex; gap: 12px; text-align: left;
            padding: 14px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.08);
            background: #fff; cursor: pointer; font: inherit; color: inherit;
          }
          .opt:hover { background: #f5f5f5; }
          .opt:disabled { opacity: 0.6; cursor: default; }
          .emoji { font-size: 20px; line-height: 1.3; }
          .body { display: flex; flex-direction: column; gap: 2px; }
          .label { font: 600 14px/1.3 var(--a2ui-font-family, inherit); }
          .rationale { color: #666; font-size: 12.5px; line-height: 1.4; }
          .shimmer {
            display: inline-block; height: 0.9em; min-width: 140px; border-radius: 4px;
            background: linear-gradient(90deg, rgba(0,0,0,0.06) 0%, rgba(0,0,0,0.14) 50%, rgba(0,0,0,0.06) 100%);
            background-size: 200% 100%; animation: a2ui-pulse 1.1s ease-in-out infinite;
          }
          @keyframes a2ui-pulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        `;
        createController() { return new A2uiController(this, OptionsGridApi); }
        render() {
          const props = this.controller.props;
          if (!props) return nothing;
          const opts = props.options ?? [];
          return html`
            ${props.prompt ? html`<p class="prompt">${props.prompt}</p>` : nothing}
            <div class="list">
              ${opts.map((o) => {
                const ready = !!(o.label && o.action);
                return html`
                  <button class="opt" ?disabled=${!ready}
                    @click=${() => ready && o.action()}>
                    ${o.emoji ? html`<span class="emoji">${o.emoji}</span>` : nothing}
                    <span class="body">
                      <span class="label">${o.label ?? html`<span class="shimmer"></span>`}</span>
                      ${o.rationale ? html`<span class="rationale">${o.rationale}</span>` : nothing}
                    </span>
                  </button>`;
              })}
            </div>`;
        }
      }
      customElements.define('a2ui-options-grid', A2uiOptionsGridElement);
      const A2uiOptionsGrid = { ...OptionsGridApi, tagName: 'a2ui-options-grid' };

      // ---- RichMessageCard --------------------------------------------
      // A strong-take recommendation card: headline + rationale + two
      // actions (confirm / dismiss). Good for "here's my take, agree?".
      const RichMessageCardApi = {
        name: 'RichMessageCard',
        schema: z.object({
          recommendationType: z.enum(['strong', 'positive', 'lifestyle', 'informational', 'professional', 'alternative']).optional(),
          confidence: z.enum(['low', 'medium', 'high']).optional(),
          headline: DynString.optional(),
          rationale: DynString.optional(),
          confirmAction: z.object({
            label: DynString,
            event: z.object({
              name: DynString,
              context: z.record(z.any()).optional(),
            }),
          }).optional(),
          dismissAction: z.object({
            label: DynString,
            event: z.object({
              name: DynString,
              context: z.record(z.any()).optional(),
            }),
          }).optional(),
        }).strict(),
      };

      class A2uiRichMessageCardElement extends A2uiLitElement {
        static styles = css`
          :host { display: block; margin: var(--a2ui-spacing-m, 12px) 0; }
          .card { padding: 18px; border-radius: 16px; border: 1px solid; font: inherit; }
          .card-strong        { border-color: rgba(17,17,17,0.3); background: linear-gradient(135deg, rgba(17,17,17,0.10), rgba(17,17,17,0.02)); }
          .card-positive      { border-color: rgba(46,125,50,0.3); background: linear-gradient(135deg, rgba(46,125,50,0.10), rgba(46,125,50,0.02)); }
          .card-lifestyle     { border-color: rgba(230,81,0,0.3);  background: linear-gradient(135deg, rgba(230,81,0,0.10),  rgba(230,81,0,0.02)); }
          .card-informational { border-color: rgba(21,101,192,0.3); background: linear-gradient(135deg, rgba(21,101,192,0.10), rgba(21,101,192,0.02)); }
          .card-professional  { border-color: rgba(106,27,154,0.3); background: linear-gradient(135deg, rgba(106,27,154,0.10), rgba(106,27,154,0.02)); }
          .card-alternative   { border-color: rgba(173,20,87,0.3);  background: linear-gradient(135deg, rgba(173,20,87,0.10),  rgba(173,20,87,0.02)); }
          .meta { display: flex; justify-content: space-between; font-size: 11px; font-weight: 600; letter-spacing: .1em; margin-bottom: 10px; }
          .conf { color: #888; }
          .headline { font-size: 19px; font-weight: 700; margin: 0 0 8px; line-height: 1.25; }
          .rationale { font-size: 14px; line-height: 1.55; color: #333; margin: 0 0 14px; }
          .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
          .btn { padding: 10px 16px; border-radius: 10px; border: none; cursor: pointer; font: inherit; font-weight: 500; font-size: 14px; }
          .btn-primary { background: #111; color: #fff; }
          .btn-ghost { background: transparent; color: #111; text-decoration: underline; padding: 10px 0; }
          .btn:disabled { opacity: 0.6; cursor: default; }
          .shimmer {
            display: inline-block; height: 1em; width: 70%; border-radius: 4px;
            background: linear-gradient(90deg, rgba(0,0,0,0.06) 0%, rgba(0,0,0,0.14) 50%, rgba(0,0,0,0.06) 100%);
            background-size: 200% 100%; animation: a2ui-pulse 1.1s ease-in-out infinite;
          }
          @keyframes a2ui-pulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        `;
        createController() { return new A2uiController(this, RichMessageCardApi); }
        render() {
          const props = this.controller.props;
          if (!props) return nothing;
          const t = props.recommendationType ?? 'strong';
          const tagLabel = { strong:'STRONG TAKE', positive:'POSITIVE', lifestyle:'LIFESTYLE',
            informational:'INFO', professional:'PROFESSIONAL', alternative:'ALTERNATIVE' }[t] ?? 'TAKE';
          const confirmReady = !!(props.confirmAction?.label);
          const dismissReady = !!(props.dismissAction?.label);
          return html`
            <div class="card card-${t}">
              <div class="meta">
                <span>${tagLabel}</span>
                ${props.confidence ? html`<span class="conf">${String(props.confidence).toUpperCase()} CONFIDENCE</span>` : nothing}
              </div>
              <h2 class="headline">${props.headline ?? html`<span class="shimmer"></span>`}</h2>
              <p class="rationale">${props.rationale ?? html`<span class="shimmer" style="width:90%"></span>`}</p>
              <div class="actions">
                ${props.confirmAction ? html`<button class="btn btn-primary" ?disabled=${!confirmReady}
                  @click=${() => confirmReady && this._fire(props.confirmAction)}>${props.confirmAction.label ?? html`<span class="shimmer" style="width:60px"></span>`}</button>` : nothing}
                ${props.dismissAction ? html`<button class="btn btn-ghost" ?disabled=${!dismissReady}
                  @click=${() => dismissReady && this._fire(props.dismissAction)}>${props.dismissAction.label ?? html`<span class="shimmer" style="width:60px"></span>`}</button>` : nothing}
              </div>
            </div>`;
        }
        // confirmAction / dismissAction aren't detected as Actions by the
        // binder (they're plain objects, not unions with `event`), so we
        // dispatch manually through the surface.
        _fire(action) {
          const name = action.event?.name;
          if (!name) return;
          const surface = this.context?.dataContext?.surface;
          if (!surface) return;
          surface.dispatchAction({ event: { name, context: action.event.context ?? {} } }, 'RichMessageCard');
        }
      }
      customElements.define('a2ui-rich-message-card', A2uiRichMessageCardElement);
      const A2uiRichMessageCard = { ...RichMessageCardApi, tagName: 'a2ui-rich-message-card' };

      // ==================================================================
      // SECTION 2 — Build the starter catalog
      //
      // Extend basicCatalog's 18 components with our 2 extensions. The
      // MessageProcessor uses this catalog to validate every updateComponents
      // message: unknown component types or extra fields will throw.
      // ==================================================================
      const starterCatalog = new Catalog(
        STARTER_CATALOG_ID,
        [
          ...Array.from(basicCatalog.components.values()),
          A2uiOptionsGrid,
          A2uiRichMessageCard,
        ],
        Array.from(basicCatalog.functions.values()),
      );

      // ==================================================================
      // SECTION 3 — FieldParser
      //
      // Incremental XML-tag parser. The LLM is instructed to reply in
      //   <field1>...</field1><field2>...</field2>
      // shape; this parser emits per-field deltas as they stream in. Same
      // algorithm as a2ui-skills-swiftui's FieldParser.swift.
      // ==================================================================
      class FieldParser {
        constructor(fieldNames) {
          this.fieldNames = new Set(fieldNames);
          this.buffer = '';
          this.currentField = null;
          this.currentValue = '';
          this.lastEmitted = '';
        }
        feed(delta) {
          this.buffer += delta;
          const out = [];
          while (true) {
            if (this.currentField == null) {
              const lt = this.buffer.indexOf('<');
              if (lt === -1) { this.buffer = ''; return out; }
              const gt = this.buffer.indexOf('>', lt);
              if (gt === -1) { this.buffer = this.buffer.slice(lt); return out; }
              const tag = this.buffer.slice(lt + 1, gt);
              if (this.fieldNames.has(tag)) {
                this.currentField = tag;
                this.currentValue = '';
                this.lastEmitted = '';
                this.buffer = this.buffer.slice(gt + 1);
              } else {
                this.buffer = this.buffer.slice(gt + 1);
              }
            } else {
              const closing = `</${this.currentField}>`;
              const closeIdx = this.buffer.indexOf(closing);
              if (closeIdx !== -1) {
                this.currentValue += this.buffer.slice(0, closeIdx);
                const chunk = this.currentValue.slice(this.lastEmitted.length);
                out.push({ fieldName: this.currentField, accumulatedValue: this.currentValue, chunkValue: chunk, isFinal: true });
                this.buffer = this.buffer.slice(closeIdx + closing.length);
                this.currentField = null;
                this.currentValue = '';
                this.lastEmitted = '';
                continue;
              }
              // Only hold back the trailing chars that could be the START of
              // the closing tag — e.g. if closing is "</lbl>" and the buffer
              // ends with "</l", hold those 3 chars; if it ends with "foo",
              // hold nothing. Prevents swallowing real content.
              const maxHold = Math.min(closing.length - 1, this.buffer.length);
              let hold = 0;
              for (let h = maxHold; h >= 1; h--) {
                if (closing.startsWith(this.buffer.slice(-h))) { hold = h; break; }
              }
              if (this.buffer.length > hold) {
                const commit = this.buffer.slice(0, this.buffer.length - hold);
                this.currentValue += commit;
                this.buffer = this.buffer.slice(this.buffer.length - hold);
                if (this.currentValue !== this.lastEmitted) {
                  const chunk = this.currentValue.slice(this.lastEmitted.length);
                  out.push({ fieldName: this.currentField, accumulatedValue: this.currentValue, chunkValue: chunk, isFinal: false });
                  this.lastEmitted = this.currentValue;
                }
              }
              return out;
            }
          }
        }
        finish() {
          const out = [];
          if (this.currentField != null) {
            this.currentValue += this.buffer;
            if (this.currentValue !== this.lastEmitted) {
              const chunk = this.currentValue.slice(this.lastEmitted.length);
              out.push({ fieldName: this.currentField, accumulatedValue: this.currentValue, chunkValue: chunk, isFinal: true });
            }
            this.currentField = null;
            this.buffer = '';
          }
          return out;
        }
      }

      // ==================================================================
      // SECTION 4 — LLM stream (Anthropic SSE → FieldParser deltas)
      // ==================================================================
      async function* streamAnthropicViaProxy({ systemPrompt, userMessage, history, fields, proxyUrl, apiKey }) {
        const tagTemplate = fields
          .map(f => `<${f.name}>${f.description.trim()}</${f.name}>`)
          .join('\n');
        const fullSystem = systemPrompt + `

## RESPONSE FORMAT

Output ONLY the XML-tagged response below, filled in. No preamble, no
commentary, no markdown code fences. Tags in the exact order shown.

${tagTemplate}

The descriptions above are INSTRUCTIONS for what to write inside each tag —
replace them with your actual content.`;

        const headers = { 'Content-Type': 'application/json' };
        if (apiKey) { headers['x-api-key'] = apiKey; headers['anthropic-version'] = '2023-06-01'; }

        const body = JSON.stringify({
          model: MODEL,
          max_tokens: 1024,
          system: fullSystem,
          messages: [
            ...history.map(h => ({ role: h.role, content: h.text })),
            { role: 'user', content: userMessage },
          ],
          stream: true,
        });

        const url = proxyUrl ? `${proxyUrl.replace(/\/$/, '')}/v1/messages` : 'https://api.anthropic.com/v1/messages';
        const resp = await fetch(url, { method: 'POST', headers, body });
        if (!resp.ok) {
          const err = await resp.text();
          throw new Error(`LLM endpoint error ${resp.status}: ${err.slice(0, 200)}`);
        }

        const parser = new FieldParser(fields.map(f => f.name));
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          let nl;
          while ((nl = buf.indexOf('\n')) !== -1) {
            const line = buf.slice(0, nl); buf = buf.slice(nl + 1);
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6).trim();
            if (payload === '[DONE]') continue;
            try {
              const ev = JSON.parse(payload);
              if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta' && ev.delta.text) {
                for (const d of parser.feed(ev.delta.text)) yield d;
              }
            } catch {/* partial SSE line */}
          }
        }
        for (const d of parser.finish()) yield d;
      }

      // ==================================================================
      // SECTION 5 — SKILL.md loader
      //
      // Skills are real .md files with YAML frontmatter (matches Anthropic's
      // SKILL.md open standard). One file per skill in /skills/.
      // ==================================================================
      function parseSkillMarkdown(md) {
        const m = /^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/.exec(md);
        if (!m) throw new Error('SKILL.md missing frontmatter fence');
        const frontmatter = yaml.load(m[1]) || {};
        const body = m[2] || '';
        const skill = {
          name: frontmatter.name,
          description: frontmatter.description || '',
          triggers: frontmatter.triggers || [],
          body,
          skeleton: frontmatter.first_turn_skeleton?.components || null,
          fillFields: frontmatter.first_turn_fill_fields
            ? Object.entries(frontmatter.first_turn_fill_fields).map(
                ([name, spec]) => ({ name, description: (spec?.description ?? spec ?? '').trim() })
              )
            : null,
        };
        if (!skill.name) throw new Error('SKILL.md missing `name` in frontmatter');
        return skill;
      }

      async function loadSkillBundles(ids) {
        const results = await Promise.all(ids.map(async id => {
          const resp = await fetch(`./skills/${id}.md`);
          if (!resp.ok) throw new Error(`Failed to load skills/${id}.md: HTTP ${resp.status}`);
          return parseSkillMarkdown(await resp.text());
        }));
        const map = new Map();
        for (const s of results) map.set(s.name, s);
        return map;
      }

      // ==================================================================
      // SECTION 6 — SkillRuntime
      //
      // Orchestrates the chat: routes user events to skills, streams LLM
      // replies, emits A2UI v0.9 messages to the shared MessageProcessor.
      // Every emitted message is also appended to a wire log so the devtools
      // panel can show the protocol flow in real time.
      // ==================================================================
      class SkillRuntime {
        constructor({ skills, defaultSkillId, processor, proxyUrl, apiKey = '' }) {
          this.skills = skills;
          this.defaultSkillId = defaultSkillId;
          this.activeSkillId = defaultSkillId;
          this.processor = processor;
          this.proxyUrl = proxyUrl;
          this.apiKey = apiKey;
          this.turns = [];   // UI transcript
          this.history = [];
          this.wireLog = []; // every v0.9 message emitted
          this.counter = 0;
          this.listeners = new Set();
          this.lastError = null;
        }

        subscribe(fn) { this.listeners.add(fn); return () => this.listeners.delete(fn); }
        emit() { for (const l of this.listeners) l(); }

        _send(msgs) {
          for (const m of msgs) {
            this.wireLog.push({ ts: Date.now(), msg: m });
            if (this.wireLog.length > 400) this.wireLog.shift();
          }
          this.processor.processMessages(msgs);
        }

        primeSurface(skillId, surfaceId) {
          const skill = this.skills.get(skillId);
          if (!skill?.skeleton) return null;
          this._send([
            { version: 'v0.9', createSurface: { surfaceId, catalogId: STARTER_CATALOG_ID } },
            { version: 'v0.9', updateComponents: { surfaceId, components: skill.skeleton } },
          ]);
          return surfaceId;
        }

        primeGreeting() {
          this.primeSurface(this.defaultSkillId, 'greeting');
          this.turns.push({ kind: 'agent', surfaceId: 'greeting' });
          this.emit();
        }

        showKitchenSink() {
          // Special-case: reset transcript to a single kitchen-sink surface.
          const sid = `kitchen_${Date.now()}`;
          this.primeSurface('kitchen', sid);
          this.turns = [{ kind: 'agent', surfaceId: sid }];
          this.emit();
        }

        handleUserEvent(name, context = {}, echoLabel = null) {
          // Restart closes the current conversation and re-primes greeting.
          if (name === 'restart') {
            this.turns = [];
            this.activeSkillId = this.defaultSkillId;
            this.history = [];
            this.primeGreeting();
            return;
          }
          if (name === 'show_kitchen_sink') {
            this.showKitchenSink();
            return;
          }
          if (echoLabel) this.turns.push({ kind: 'userPill', label: echoLabel });
          this.turns.push({ kind: 'thinking', id: `t_${Date.now()}` });
          this.emit();
          this._processTurn({ userMessage: this._describeTap(name, context), eventName: name });
        }

        handleUserText(text) {
          this.turns.push({ kind: 'user', text });
          this.turns.push({ kind: 'thinking', id: `t_${Date.now()}` });
          this.emit();
          this._processTurn({ userMessage: text, eventName: null });
        }

        _describeTap(name, ctx) {
          const keys = Object.keys(ctx || {});
          const c = keys.length ? ` with context ${JSON.stringify(ctx)}` : '';
          return `User tapped option: ${name}${c}.`;
        }

        async _processTurn({ userMessage, eventName }) {
          if (eventName) {
            for (const s of this.skills.values()) {
              if (s.triggers?.includes(eventName)) { this.activeSkillId = s.name; break; }
            }
          }
          const skill = this.skills.get(this.activeSkillId);
          if (!skill) return;

          this.counter++;
          const sid = `msg_${this.counter}`;

          if (skill.skeleton && skill.fillFields && skill.triggers.includes(eventName)) {
            this._send([
              { version: 'v0.9', createSurface: { surfaceId: sid, catalogId: STARTER_CATALOG_ID } },
              { version: 'v0.9', updateDataModel: { surfaceId: sid, value: { reply: {} } } },
              { version: 'v0.9', updateComponents: { surfaceId: sid, components: skill.skeleton } },
            ]);
            this._replaceThinking(sid);
            this.emit();
            await this._streamFill(skill, sid, userMessage, null);
          } else {
            // Fallback: single body paragraph via path binding.
            const fallback = [
              { id: 'body', component: 'Text', variant: 'body', text: { path: '/reply/body' } },
              { id: 'root', component: 'Column', children: ['body'] },
            ];
            this._send([
              { version: 'v0.9', createSurface: { surfaceId: sid, catalogId: STARTER_CATALOG_ID } },
              { version: 'v0.9', updateDataModel: { surfaceId: sid, value: { reply: { body: '' } } } },
              { version: 'v0.9', updateComponents: { surfaceId: sid, components: fallback } },
            ]);
            this._replaceThinking(sid);
            this.emit();
            await this._streamFill(skill, sid, userMessage, [
              { name: 'body', description: 'A direct, helpful reply. Plain prose, no markdown.' }
            ]);
          }
          this.history.push({ role: 'user', text: userMessage });
        }

        _replaceThinking(surfaceId) {
          for (let i = this.turns.length - 1; i >= 0; i--) {
            if (this.turns[i].kind === 'thinking') {
              this.turns[i] = { kind: 'agent', surfaceId };
              return;
            }
          }
          this.turns.push({ kind: 'agent', surfaceId });
        }

        async _streamFill(skill, surfaceId, userMessage, fieldsOverride) {
          const fields = fieldsOverride || skill.fillFields;
          const systemPrompt = skill.body;
          const finalVals = {};
          try {
            for await (const delta of streamAnthropicViaProxy({
              systemPrompt, userMessage, history: this.history, fields,
              proxyUrl: this.proxyUrl, apiKey: this.apiKey,
            })) {
              finalVals[delta.fieldName] = delta.accumulatedValue;
              await this._setSmoothly({
                surfaceId,
                path: `/reply/${delta.fieldName}`,
                chunk: delta.chunkValue,
                accumulated: delta.accumulatedValue,
              });
            }
          } catch (e) {
            this.lastError = String(e.message || e);
            this.emit();
          }
          const historyText = Object.entries(finalVals).map(([k, v]) => `${k}: ${v}`).join('\n');
          if (historyText) this.history.push({ role: 'assistant', text: historyText });
        }

        // Emit updateDataModel with `set` for the growing accumulated string.
        // RFC Proposal 3 ("append" op) would be nicer on the wire, but the
        // official MessageProcessor only supports `set` — so we send the
        // full value each tick. Client-side we split into char-paced sub-
        // updates so the visual effect is a typewriter, not a jump.
        async _setSmoothly({ surfaceId, path, chunk, accumulated }) {
          if (!chunk) return;
          if (SMOOTH_CPS <= 0) {
            this._send([{ version: 'v0.9', updateDataModel: { surfaceId, path, value: accumulated } }]);
            this.emit();
            return;
          }
          const delayMs = Math.max(1, Math.floor(1000 / SMOOTH_CPS));
          const startLen = accumulated.length - chunk.length;
          for (let i = 0; i < chunk.length; i++) {
            const partial = accumulated.slice(0, startLen + i + 1);
            this._send([{ version: 'v0.9', updateDataModel: { surfaceId, path, value: partial } }]);
            this.emit();
            if (i < chunk.length - 1) await new Promise(r => setTimeout(r, delayMs));
          }
        }
      }

      // ==================================================================
      // SECTION 7 — App shell
      // ==================================================================
      class A2UIStarter extends LitElement {
        static properties = {
          _tick: { state: true },
          _composer: { state: true },
          _devOpen: { state: true },
        };
        static styles = css`
          :host { display: grid; grid-template-columns: 1fr auto; height: 100%; max-width: 1200px; margin: 0 auto; }
          .main-col { display: flex; flex-direction: column; min-width: 0; max-width: 760px; margin: 0 auto; width: 100%; }
          header.top { padding: 16px 20px; border-bottom: 1px solid rgba(0,0,0,0.06); display: flex; align-items: center; justify-content: space-between; background: #fff; gap: 12px; }
          .brand { font-weight: 700; font-size: 18px; letter-spacing: -0.01em; }
          .brand .sub { font-weight: 400; color: #888; font-size: 12px; margin-left: 8px; }
          .muted { font-size: 12px; color: #666; }
          .header-actions { display: flex; gap: 6px; align-items: center; }
          .hdr-btn { padding: 6px 10px; font: 500 12px Inter; background: #f0f0f0; color: #111; border: none; border-radius: 8px; cursor: pointer; }
          .hdr-btn:hover { background: #e3e3e3; }

          .transcript { flex: 1; overflow-y: auto; padding: 24px 20px 20px; }
          .transcript-inner { display: flex; flex-direction: column; gap: 20px; }

          .turn-user     { align-self: flex-end; max-width: 80%; padding: 10px 14px; border-radius: 18px 18px 4px 18px; background: #111; color: #fff; }
          .turn-userPill { align-self: flex-end; max-width: 80%; padding: 8px 12px;  border-radius: 18px 18px 4px 18px; background: #e5e5e5; color: #111; font-style: italic; }

          .thinking { display: flex; gap: 6px; padding: 10px 0; align-self: flex-start; }
          .thinking span { width: 8px; height: 8px; border-radius: 50%; background: #bbb; animation: bounce 1.2s infinite; }
          .thinking span:nth-child(2) { animation-delay: .15s; }
          .thinking span:nth-child(3) { animation-delay: .30s; }
          @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity: .4; } 40% { transform: translateY(-5px); opacity: 1; } }

          footer.bottom { border-top: 1px solid rgba(0,0,0,0.06); padding: 14px 20px; background: #fff; }
          .composer { display: flex; gap: 8px; }
          .composer input { flex: 1; padding: 12px 14px; border-radius: 12px; border: 1px solid #ddd; font: inherit; }
          .composer button { padding: 12px 18px; border-radius: 12px; border: none; background: #111; color: #fff; cursor: pointer; font: inherit; }

          a2ui-surface { display: block; }

          .dev-col { width: 0; overflow: hidden; transition: width 0.18s ease; background: #1a1f2b; color: #c5cbd4; display: flex; flex-direction: column; }
          .dev-col.open { width: 400px; }
          .dev-header { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.08); }
          .dev-title { font: 600 13px/1 Inter; color: #fff; letter-spacing: 0.02em; }
          .dev-sub   { font: 11px/1.2 Inter; color: #8892a8; margin-top: 4px; max-width: 320px; }
          .dev-close { background: transparent; border: none; color: #8892a8; cursor: pointer; font-size: 16px; padding: 4px 8px; }
          .dev-close:hover { color: #fff; }
          .dev-list  { flex: 1; overflow-y: auto; padding: 8px 10px; font: 11.5px/1.5 "JetBrains Mono", ui-monospace, monospace; }
          .dev-entry { margin-bottom: 8px; border-left: 2px solid #2e5cff; padding-left: 8px; }
          .dev-when  { color: #7a839a; font-size: 10px; }
          .dev-json  { white-space: pre-wrap; word-break: break-word; }
          .dev-toggle {
            position: fixed; top: 16px; right: 16px; z-index: 10;
            padding: 8px 12px; font: 500 12px Inter; background: #1a1f2b; color: #fff;
            border: none; border-radius: 8px; cursor: pointer; opacity: 0.85;
          }
          .dev-toggle:hover { opacity: 1; }

          .boot-state { display: flex; align-items: center; gap: 12px; padding: 40px; justify-content: center; }
        `;

        constructor() {
          super();
          this._tick = 0;
          this._composer = '';
          this._devOpen = false;
          this._loadStatus = 'loading';
          this._loadDetail = '';
          this.runtime = null;
          this.processor = null;
        }

        async _bootstrap() {
          try {
            const skills = await loadSkillBundles(['greeting', 'planner', 'decider', 'critic', 'kitchen']);

            let apiKey = '';
            if (!PROXY_URL) {
              apiKey = localStorage.getItem('a2ui_anthropic_key') || '';
              if (!apiKey) {
                apiKey = prompt('No proxy configured. Paste an Anthropic API key to run against api.anthropic.com directly (saved to localStorage).') || '';
                if (apiKey) localStorage.setItem('a2ui_anthropic_key', apiKey);
              }
            }

            // The MessageProcessor is the source of truth for surface state.
            // Its action handler is the bridge from button clicks back into
            // the SkillRuntime.
            const processor = new MessageProcessor([starterCatalog], (action) => {
              // action = { name, surfaceId, sourceComponentId, timestamp, context }
              const label = action.context?.__echo ?? null;
              this.runtime?.handleUserEvent(action.name, action.context ?? {}, label);
            });
            this.processor = processor;

            this.runtime = new SkillRuntime({
              skills, defaultSkillId: 'greeting', processor,
              proxyUrl: PROXY_URL, apiKey,
            });
            this._unsub = this.runtime.subscribe(() => { this._tick++; });

            this.runtime.wireLog.push({
              ts: Date.now(),
              msg: { info: {
                loaded_skills: Array.from(skills.keys()),
                starter_catalog_id: STARTER_CATALOG_ID,
                basic_catalog_components: Array.from(basicCatalog.components.keys()),
                starter_extensions: ['OptionsGrid', 'RichMessageCard'],
              } },
            });

            this._loadStatus = 'ready';
            this._tick++;
            this.runtime.primeGreeting();
          } catch (err) {
            console.error(err);
            this._loadStatus = 'error';
            this._loadDetail = String(err?.message || err);
            this._tick++;
          }
        }

        connectedCallback() {
          super.connectedCallback();
          this._bootstrap();
          this._scrollTimer = setInterval(() => {
            const t = this.renderRoot?.querySelector('.transcript');
            if (t) t.scrollTop = t.scrollHeight;
          }, 120);
        }
        disconnectedCallback() {
          super.disconnectedCallback();
          this._unsub?.();
          clearInterval(this._scrollTimer);
        }

        send() {
          const t = this._composer.trim();
          if (!t || !this.runtime) return;
          this.runtime.handleUserText(t);
          this._composer = '';
        }

        render() {
          if (this._loadStatus === 'loading') {
            return html`<div class="boot-state">
              <div class="thinking"><span></span><span></span><span></span></div>
              <span class="muted">Loading official A2UI renderer + skills…</span>
            </div>`;
          }
          if (this._loadStatus === 'error') {
            return html`<div class="boot-state" style="color:#c00">
              <strong>Failed to bootstrap:</strong> ${this._loadDetail}
            </div>`;
          }
          const basicCount = basicCatalog.components.size;
          return html`
            <div class="main-col">
              <header class="top">
                <div>
                  <span class="brand">A2UI Web Starter</span>
                  <span class="sub">official @a2ui/lit · ${basicCount} + 2 components</span>
                </div>
                <div class="header-actions">
                  <button class="hdr-btn" @click=${() => this.runtime.handleUserEvent('show_kitchen_sink', {})}>Kitchen sink</button>
                  <button class="hdr-btn" @click=${() => this.runtime.handleUserEvent('restart', {})}>Restart</button>
                </div>
              </header>
              <div class="transcript">
                <div class="transcript-inner">
                  ${this.runtime.turns.map(t => this._renderTurn(t))}
                  ${this.runtime.lastError ? html`<p class="muted" style="color:#c00">${this.runtime.lastError}</p>` : nothing}
                </div>
              </div>
              <footer class="bottom">
                <div class="composer">
                  <input .value=${this._composer}
                    @input=${(e) => this._composer = e.target.value}
                    @keydown=${(e) => { if (e.key === 'Enter') this.send(); }}
                    placeholder="Type anything…" />
                  <button @click=${() => this.send()}>Send</button>
                </div>
              </footer>
            </div>
            <aside class="dev-col ${this._devOpen ? 'open' : ''}">
              <div class="dev-header">
                <div>
                  <div class="dev-title">A2UI Wire Log</div>
                  <div class="dev-sub">Every v0.9 message sent to the official MessageProcessor. Proves the app is really speaking A2UI.</div>
                </div>
                <button class="dev-close" @click=${() => this._devOpen = false} title="Close">×</button>
              </div>
              <div class="dev-list">
                ${this.runtime.wireLog.slice().reverse().slice(0, 200).map(entry => html`
                  <div class="dev-entry">
                    <div class="dev-when">${new Date(entry.ts).toLocaleTimeString()} · ${Object.keys(entry.msg).filter(k => k !== 'version').join(', ')}</div>
                    <div class="dev-json">${JSON.stringify(entry.msg, null, 2)}</div>
                  </div>
                `)}
                ${this.runtime.wireLog.length === 0 ? html`<div class="muted">No messages yet.</div>` : nothing}
              </div>
            </aside>
            ${this._devOpen ? nothing : html`<button class="dev-toggle" @click=${() => this._devOpen = true}>Show A2UI wire log</button>`}
          `;
        }

        _renderTurn(turn) {
          if (turn.kind === 'user')      return html`<div class="turn-user">${turn.text}</div>`;
          if (turn.kind === 'userPill')  return html`<div class="turn-userPill">${turn.label}</div>`;
          if (turn.kind === 'thinking')  return html`<div class="thinking"><span></span><span></span><span></span></div>`;
          // agent turn: mount an <a2ui-surface> for the given surfaceId.
          // The surface property accepts a SurfaceModel — we pull it from the
          // MessageProcessor, which has already applied updateComponents.
          const surface = this.processor?.model.getSurface(turn.surfaceId);
          if (!surface) return html`<div class="thinking"><span></span><span></span><span></span></div>`;
          return html`<a2ui-surface .surface=${surface}></a2ui-surface>`;
        }
      }
      customElements.define('a2ui-starter', A2UIStarter);
    </script>
  </body>
</html>
